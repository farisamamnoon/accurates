services:
  backend:
    build: ./backend
    container_name: erp-backend
    ports:
      - "3000:3000"
    volumes:
      - erp_db_data:/app/data
    environment:
      - DATABASE_PATH=/app/data/database.db
      - NODE_ENV=production
    restart: always

  frontend:
    build: 
      context: ./frontend
      args:
        # Docker Compose grabs VITE_API_BASE_URL from your .env file
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: erp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  erp_db_data:
